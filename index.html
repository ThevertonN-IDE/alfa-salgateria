<!DOCTYPE html>
<html lang="pt-br" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ea580c">
    <title>Alfa App | High Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="./src/style/variables.css">
    <link rel="stylesheet" href="./src/style/global.css">
</head>

<body
    class="bg-[#f8fafc] text-gray-800 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 flex flex-col min-h-screen pb-20">

    <header class="header-bg text-white h-16 shadow-lg sticky top-0 z-50 flex items-center justify-between px-4">
        <button data-action="toggle-sidebar"
            class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/20 transition active:scale-95">
            <i class="fas fa-bars text-xl"></i>
        </button>

        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-white rounded-full p-0.5 shadow-md overflow-hidden border-2 border-white/40 relative">
                <img id="logo-header" src="./assets/default-logo.png"
                    class="w-full h-full object-cover rounded-full logo-loja-dinamica"
                    onerror="this.src='./assets/default-logo.png'">
            </div>
            <span
                class="font-black text-lg tracking-tight uppercase text-shadow nome-loja-dinamico">Carregando...</span>
        </div>

        <div id="header-profile-area">
            <button data-action="login-redirect"
                class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center border border-white/30 text-white shadow-sm active:scale-95 transition">
                <i class="fas fa-user"></i>
            </button>
        </div>
    </header>

    <div id="sidebar-overlay" data-action="toggle-sidebar"
        class="fixed inset-0 bg-black/60 z-[60] hidden transition-opacity opacity-0 backdrop-blur-sm"></div>
    <div id="sidebar"
        class="fixed inset-y-0 left-0 w-[85%] max-w-xs force-white-light z-[70] transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col border-r border-gray-200 dark:border-gray-800">

        <div class="p-6 header-bg text-white">
            <div class="flex items-center gap-4 mb-4">
                <div
                    class="w-16 h-16 bg-white rounded-full p-0.5 overflow-hidden shadow-lg border-2 border-white/20 relative">
                    <img id="logo-sidebar" src="./assets/default-logo.png"
                        class="w-16 h-16 object-cover rounded-full logo-loja-dinamica border-2 border-white/20 shadow-lg">
                    <div
                        class="absolute inset-0 flex items-center justify-center text-primary font-black text-2xl bg-white">
                        <i class="fas fa-store"></i>
                    </div>
                </div>
                <div>
                    <h2 class="font-black text-xl leading-none">Bem-vindo!</h2>
                    <p id="nome-cliente-sidebar" class="text-sm opacity-90 mt-1 font-medium">Visitante</p>
                </div>
            </div>
            <button id="btn-login-sidebar" data-action="login-redirect"
                class="bg-white text-primary w-full py-2.5 rounded-xl font-bold text-sm shadow-sm hover:bg-gray-50 transition uppercase">
                Entrar / Cadastrar
            </button>
        </div>

        <nav class="p-4 space-y-2 flex-grow overflow-y-auto">
            <div id="sidebar-user-links"
                class="hidden space-y-2 mb-4 pb-4 border-b border-gray-100 dark:border-gray-700">
                <button id="btn-admin-panel" data-action="admin-redirect"
                    class="w-full flex items-center gap-4 p-3.5 rounded-xl bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-300 transition font-bold text-sm hidden border border-purple-100 dark:border-purple-800">
                    <i class="fas fa-tools text-lg"></i> Painel Admin
                </button>
                <button data-action="profile-redirect"
                    class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-orange-50 dark:hover:bg-gray-800 transition font-bold text-sm">
                    <i class="fas fa-user-circle text-xl"></i> Meu Perfil
                </button>
                <button data-action="open-orders"
                    class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-orange-50 dark:hover:bg-gray-800 transition font-bold text-sm">
                    <div
                        class="w-8 h-8 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-500 relative">
                        <i class="fas fa-receipt"></i>
                        <span id="badge-pedidos-side"
                            class="hidden absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 border-2 border-white rounded-full"></span>
                    </div>
                    Meus Pedidos
                </button>
            </div>

            <button data-action="orders-redirect"
                class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-800 transition font-bold text-sm">
                <div
                    class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-500">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                Encomendas
            </button>
            <button data-action="whatsapp-redirect"
                class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-green-50 dark:hover:bg-gray-800 transition font-bold text-sm">
                <div
                    class="w-8 h-8 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-500">
                    <i class="fab fa-whatsapp"></i>
                </div>
                Fale Conosco
            </button>
            <button data-action="toggle-theme"
                class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-purple-50 dark:hover:bg-gray-800 transition font-bold text-sm">
                <div
                    class="w-8 h-8 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-500">
                    <i id="icon-tema" class="fas fa-moon"></i>
                </div>
                Alterar Tema
            </button>
            <button id="btn-logout" data-action="logout"
                class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition font-bold text-sm mt-4 border-t border-gray-100 dark:border-gray-700 hidden">
                <i class="fas fa-sign-out-alt pointer-events-none"></i> Sair da Conta
            </button>
        </nav>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Alfa App v1.4.0</p>
            <p class="text-[9px] text-gray-300 dark:text-gray-600 mt-1">Dev by Theverton</p>
        </div>
    </div>

    <div class="px-5 py-3 force-white-light shadow-sm sticky top-16 z-30 transition-colors">
        <div class="relative group">
            <i class="fas fa-search absolute left-4 top-3.5 text-gray-400 text-sm"></i>
            <input type="text" id="input-busca" placeholder="Buscar delícias..."
                class="w-full pl-10 pr-10 py-3 bg-white dark:bg-gray-800 rounded-2xl outline-none font-bold text-sm text-gray-700 dark:text-white placeholder-gray-400 focus:ring-2 ring-orange-500 transition-all border border-gray-200 dark:border-gray-700 shadow-sm">
            <button data-action="clear-search" id="btn-limpar-busca"
                class="absolute right-3 top-3.5 text-gray-400 hover:text-orange-500 hidden p-1"><i
                    class="fas fa-times pointer-events-none"></i></button>
        </div>
    </div>

    <main class="p-5 space-y-8 flex-grow" id="catalog-root"></main>

    <footer
        class="mt-auto py-8 text-center border-t border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 glass">
        <p class="text-xs font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-1"><span
                class="nome-loja-dinamico">Loja</span> © 2026</p>
        <p class="text-[10px] text-gray-300 dark:text-gray-600">v1.1.0 SaaS • Dev by Theverton</p>
    </footer>

    <div id="barra-pedido"
        class="fixed bottom-5 left-5 right-5 bg-gray-900 dark:bg-primary text-white p-4 rounded-3xl shadow-2xl z-30 hidden items-center justify-between transition-transform duration-300 translate-y-32 cursor-pointer active:scale-95 ring-4 ring-white dark:ring-gray-900"
        data-action="open-cart">
        <div class="flex flex-col pl-2">
            <span class="text-[9px] opacity-70 uppercase tracking-widest font-bold">Total Estimado</span>
            <span id="total-barra" class="text-xl font-black">R$ 0,00</span>
        </div>
        <div class="flex items-center gap-2 font-bold text-xs bg-white/20 px-4 py-2.5 rounded-2xl backdrop-blur-sm">
            Ver Carrinho <span id="qtd-badge"
                class="bg-white text-gray-900 text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black">0</span>
        </div>
    </div>

    <div id="modal-resumo"
        class="fixed inset-0 bg-black/60 z-[100] hidden items-end transition-opacity opacity-0 backdrop-blur-sm"
        data-action="close-cart">
        <div class="force-white-light w-full rounded-t-[2.5rem] p-6 animate-up max-h-[90vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-2xl">Carrinho</h3>
                <button data-action="close-cart"
                    class="w-10 h-10 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center text-gray-500 transition hover:bg-gray-200"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="lista-itens-resumo" class="flex-grow overflow-y-auto custom-scroll space-y-4 mb-6 pr-2"></div>
            <div class="border-t border-gray-100 dark:border-gray-700 pt-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 dark:text-gray-400 font-bold">Total a Pagar</span>
                    <span id="total-resumo" class="text-3xl font-black text-primary dark:text-orange-500">R$
                        0,00</span>
                </div>
                <div class="grid grid-cols-[1fr_2fr] gap-4">
                    <button data-action="clear-cart"
                        class="bg-red-50 dark:bg-red-900/20 text-red-500 py-4 rounded-2xl font-bold text-sm hover:bg-red-100 transition flex items-center justify-center gap-2"><i
                            class="fas fa-trash-alt"></i> Tudo</button>
                    <button data-action="checkout-redirect"
                        class="bg-green-600 text-white py-4 rounded-2xl font-black text-base shadow-xl shadow-green-200 dark:shadow-none hover:bg-green-700 active:scale-95 transition uppercase tracking-wide flex items-center justify-center gap-2">Finalizar
                        <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-meus-pedidos"
        class="fixed inset-0 z-[100] bg-white dark:bg-gray-900 hidden flex-col animate-up transition-colors duration-300">
        <div
            class="force-white-light p-4 shadow-sm flex items-center gap-4 sticky top-0 z-10 border-b border-gray-100 dark:border-gray-800">
            <button data-action="close-orders"
                class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center hover:bg-gray-200 transition text-gray-600 dark:text-gray-300"><i
                    class="fas fa-arrow-left"></i></button>
            <h2 class="font-black text-xl">Meus Pedidos</h2>
        </div>
        <div id="lista-pedidos" class="flex-grow overflow-y-auto p-5 space-y-4 custom-scroll force-white-light"></div>
    </div>
    <div id="alfa-toast-container"
        class="fixed top-5 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col items-center pointer-events-none">
    </div>
    <div id="modal-root"></div>
    <script type="module" src="src/app.js"></script>
</body>

</html>
